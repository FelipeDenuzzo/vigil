# .github/workflows/deploy-evaluator.yml
name: Deploy vigil-evaluator

on:
  push:
    branches: [main]
    paths:
      - 'vigil-evaluator/**'
      - '.github/workflows/deploy-evaluator.yml'

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       ${{ secrets.GCP_REGION }}
  SERVICE:      vigil-evaluator
  REGISTRY:     ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE:        ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/vigil-evaluator/vigil-evaluator

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vigil-evaluator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Autenticar no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configurar Docker para Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Criar repositório no Artifact Registry se não existir
        run: |
          gcloud artifacts repositories describe vigil-evaluator --location=${{ env.REGION }} --quiet || \
          gcloud artifacts repositories create vigil-evaluator \
            --repository-format=docker \
            --location=${{ env.REGION }} \
            --description="Docker repository for vigil-evaluator" \
            --quiet

      - name: Build e push da imagem
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy no Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --service-account=${{ secrets.GCP_SA_EMAIL }} \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},EVALUATOR_SECRET=${{ secrets.EVALUATOR_SECRET }}" \
            --memory=512Mi \
            --cpu=1 \
            --timeout=30 \
            --quiet
